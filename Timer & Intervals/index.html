<body>
    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Glassmorphism Download UI</title>

      <link rel="stylesheet" href="Style.css">
    </head>
    

    <body>

        <div class="blur1"></div>
        <div class="blur2"></div>

        <div class="download-card">

            <div class="top">
                <div class="file">

                    <div class="icon">
                        ⬇
                    </div>

                    <div>
                        <h2>Cyber Pack.zip</h2>
                        <p>2.4 GB File</p>
                    </div>

                </div>

                <div class="speed">
                    18 MB/s
                </div>
            </div>

            <div class="progress-area">

                <div class="progress-info">
                    <span id="progressinfo">Downloading...</span>
                    <span id="progressNum">55%</span>
                </div>

                <div class="progress-bar">
                    <div class="progress"></div>
                </div>

            </div>

            <div class="bottom">

                <button class="download-btn">
                    Pause
                </button>

                <div class="status">
                    1h 12m remaining
                </div>

            </div>

        </div>

    </body>

    </html>

    <script src="script.js"></script>
</body>

</html>
