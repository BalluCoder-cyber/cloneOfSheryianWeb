<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        background-color: rgba(0, 0, 0, 0.893);
        margin: 0;
        padding: 0;
    }

    #main {
        display: flex;
        max-width: 200px;
        height: 100%;
    }

    .input {
        margin: 20px 20px;
    }

    input {
        padding: 10px;
        color: black;
        font-size: large;
        font-weight: bold;
        background-color: antiquewhite;
        border-radius: 10px;
    }

    .card {
        display: inline-block;
        margin: 0px 500px;
        border: 2px solid rgba(113, 98, 98, 0.907);
        max-width: 400px;
        color: white;
        padding: 25px;
        border-radius: 35px;
       
        
    }
    .profile{
        height: 70px;
        width: 70px;
        background-color: blue;
        border-radius: 35px; 
        overflow: hidden;   
    }
    .profile img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        
    }
</style>

<body>
    <div id="main">
        <div class="input">
            <form action="">
                <input type="text" placeholder="profile-pic">
                <input type="text" placeholder="name">
                <input type="text" placeholder="occupation">
                <input type="text" placeholder="info">
                <input type="submit">
            </form>
        </div>

    </div>
   
    <script src="script.js"></script>
</body>

</html>
